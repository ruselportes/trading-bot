services:
  - type: web
    name: trading-bot-backend
    env: docker
    repo: https://github.com/YOUR_USERNAME/trading-bot
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 3001
      - key: TRADING_MODE
        value: demo
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OKX_DEMO_API_KEY
        sync: false
      - key: OKX_DEMO_SECRET
        sync: false
      - key: OKX_DEMO_PASSPHRASE
        sync: false
    healthCheckPath: /health
    numInstances: 1
    plan: free
